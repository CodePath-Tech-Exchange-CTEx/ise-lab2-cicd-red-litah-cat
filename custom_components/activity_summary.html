<!DOCTYPE html>
<html class="activity-doc" lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
.activity-doc { font-family: "Inter", var(--cc-font), sans-serif; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="icon-box" aria-hidden="true">
        <!-- Lucide "activity" -->
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="header-text">
        <h1>ACTIVITY SUMMARY</h1>
      </div>
    </div>
    <div class="badge">THIS WEEK</div>
  </div>

  <div class="stats">
    <div class="stat workouts">
      <h2>{{TOTAL_WORKOUTS}}</h2>
      <p>WORKOUTS</p>
    </div>
    <div class="stat calories">
      <h2>{{TOTAL_CALORIES}}</h2>
      <p>CALORIES</p>
    </div>
    <div class="stat minutes">
      <h2>{{TOTAL_DURATION}}</h2>
      <p>MINUTES</p>
    </div>
  </div>

  <div class="goal-section">
    <div class="goal-header">
      <span>WEEKLY GOAL</span>
      <span class="goal-count">{{GOAL_DAYS}} / 7 days</span>
    </div>
    <div class="progress-bar">
      <div class="progress" data-goal-pct="{{GOAL_PCT}}"></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-dot"></div>
    <span>Activity synced - weekly goal progress</span>
  </div>
</div>
<script>
(function () {
  var el = document.querySelector('.activity-doc .progress[data-goal-pct]');
  if (!el) return;
  var v = el.getAttribute('data-goal-pct');
  if (v !== null && v !== '') el.style.width = String(v).trim() + '%';
})();
</script>
</body>
</html>
