<!DOCTYPE html>
<html class="activity-doc" lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
.activity-doc { font-family: "Inter", var(--cc-font), sans-serif; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="icon-box" aria-hidden="true">&#127939;</div>
      <div class="header-text">
        <h1>ACTIVITY SUMMARY</h1>
      </div>
    </div>
    <div class="badge">THIS WEEK</div>
  </div>

  <div class="stats">
    <div class="stat workouts">
      <h2>{{TOTAL_WORKOUTS}}</h2>
      <p>WORKOUTS</p>
    </div>
    <div class="stat calories">
      <h2>{{TOTAL_CALORIES}}</h2>
      <p>CALORIES</p>
    </div>
    <div class="stat minutes">
      <h2>{{TOTAL_DURATION}}</h2>
      <p>MINUTES</p>
    </div>
  </div>

  <div class="goal-section">
    <div class="goal-header">
      <span>WEEKLY GOAL</span>
      <span style="color: var(--cc-accent, #f97316);">{{GOAL_DAYS}} / 7 days</span>
    </div>
    <div class="progress-bar">
      <div class="progress" style="width: {{GOAL_PCT}}%;"></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-dot"></div>
    <span>Activity synced · weekly goal progress</span>
  </div>
</div>
</body>
</html>
