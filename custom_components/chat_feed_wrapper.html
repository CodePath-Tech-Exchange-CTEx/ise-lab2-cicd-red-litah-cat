<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
  --cc-bg-app: #0e1117;
  --cc-text: #e6edf3;
  --cc-text-muted: #8b949e;
  --cc-accent: #f97316;
  --cc-chat-user-bg: #1e1e2e;
  --cc-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  font-family: var(--cc-font);
  background: var(--cc-bg-app);
  color: var(--cc-text);
}

.chat-feed {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 4px;
}

.turn-divider {
  height: 1px;
  background: rgba(255,255,255,0.04);
  margin: 4px 0;
}

.chat-msg-user {
  display: flex;
  justify-content: flex-end;
  width: 100%;
  padding: 6px 0;
}

.chat-msg-user .bubble {
  max-width: 72%;
  background-color: var(--cc-chat-user-bg);
  color: #e0e0e0;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 0.92em;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.chat-msg-user .bubble .ts {
  font-size: 0.68em;
  color: #6b7280;
  text-align: right;
  margin-top: 4px;
}

.chat-msg-ai {
  display: flex;
  flex-direction: column;
  width: 100%;
  padding: 10px 0 6px 0;
}

.chat-msg-ai .label {
  font-size: 0.72em;
  font-weight: 600;
  color: var(--cc-text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.chat-msg-ai .bubble {
  color: #d1d5db;
  font-size: 0.92em;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: 90%;
}

.chat-msg-ai .ts {
  font-size: 0.68em;
  color: #4b5563;
  margin-top: 6px;
}
</style>
</head>
<body>
<div class="chat-feed">{{INNER_HTML}}</div>
</body>
</html>
