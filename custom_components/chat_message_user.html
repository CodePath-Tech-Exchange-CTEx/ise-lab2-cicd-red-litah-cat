    <div style="
        max-width: 85%; 
        background-color: #FF5722; 
        color: #FFFFFF; 
        padding: 12px 16px;

        <div style="font-size: 0.7em; color: rgba(255,255,255,0.7); text-align: right; margin-top: 6px;">{{TIMESTAMP}}</div>

</div>
