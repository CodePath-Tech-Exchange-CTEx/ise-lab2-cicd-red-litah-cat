<div style="
    display: flex;
    justify-content: flex-end;
    width: 100%;
    padding: 6px 0;
    box-sizing: border-box;">
    <div style="
        max-width: 72%;
        background-color: #1e1e2e;
        color: #e0e0e0;
        padding: 10px 14px;
        border-radius: 18px 18px 4px 18px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.92em;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;">
        {{CONTENT}}
        <div style="font-size: 0.68em; color: #6b7280; text-align: right; margin-top: 4px;">{{TIMESTAMP}}</div>
    </div>
</div>
