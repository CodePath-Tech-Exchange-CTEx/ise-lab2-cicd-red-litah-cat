<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Advice</title>
<style>
:root {
  --cc-bg-app: #0e1117;
  --cc-bg-elevated: #1c1f26;
  --cc-border: #30363d;
  --cc-text: #e6edf3;
  --cc-text-muted: #8b949e;
  --cc-accent: #f97316;
  --cc-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  font-family: var(--cc-font);
  background: var(--cc-bg-app);
  color: var(--cc-text);
}

.advice-card {
  background-color: var(--cc-bg-elevated);
  padding: 24px;
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  border: 1px solid var(--cc-border);
  max-width: 720px;
}

.advice-text {
  flex: 2;
  font-size: 1.05rem;
  color: var(--cc-text);
}

.advice-text h3 {
  color: var(--cc-accent);
  font-size: 0.95rem;
  margin-bottom: 10px;
  font-weight: 600;
}

.advice-text p {
  line-height: 1.55;
}

.advice-text .timestamp {
  font-size: 0.8rem;
  color: var(--cc-text-muted);
  margin-top: 16px;
}

.advice-image {
  flex: 1;
  min-width: 120px;
}

.advice-image img {
  width: 100%;
  border-radius: 10px;
  border: 1px solid var(--cc-border);
}
</style>
</head>
<body>
<div class="advice-card">
  <div class="advice-text">
    <h3>AI Coach Says</h3>
    <p>{{CONTENT}}</p>
    <div class="timestamp">
      Generated on {{TIMESTAMP}}<br>
      GenAI can make mistakes.
    </div>
  </div>
  <div class="advice-image">
    <img src="{{IMAGE}}" alt="" />
  </div>
</div>
</body>
</html>
