<div style="
    max-width: 420px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    border-radius: 18px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
">

    <!-- Header -->
    <div style="
        background: linear-gradient(135deg, #2E7D32, #43A047);
        color: white;
        padding: 18px 20px;
    ">
        <h2 style="margin: 0; font-weight: 600;">🏃 Workout Summary</h2> <!-- Line written by ChatGPT -->
        <p style="margin: 6px 0 0 0; font-size: 0.9em; opacity: 0.9;"> <!-- Line written by ChatGPT -->
            {{START_TIME}} – {{END_TIME}} <!-- Line written by ChatGPT -->
        </p>
    </div>

    <!-- Metrics -->
    <div style="padding: 20px;">
        <div style="
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            gap: 10px;
            margin-bottom: 20px;
        ">
            <div>
                <div style="font-size: 1.4em; font-weight: 600; color: #2E7D32;">
                    {{DISTANCE}}
                </div>
                <div style="font-size: 0.8em; color: #777;">Distance</div>
            </div>

            <div>
                <div style="font-size: 1.4em; font-weight: 600; color: #2E7D32;">
                    {{STEPS}}
                </div>
                <div style="font-size: 0.8em; color: #777;">Steps</div>
            </div>

            <div>
                <div style="font-size: 1.4em; font-weight: 600; color: #2E7D32;">
                    {{CALORIES}}
                </div>
                <div style="font-size: 0.8em; color: #777;">Calories</div>
            </div>
        </div>

        <!-- Divider -->
        <div style="height: 1px; background: #eee; margin-bottom: 15px;"></div>

        <!-- Location -->
        <div style="font-size: 0.85em; color: #555; line-height: 1.5;">
            📍 <strong>Start:</strong> {{START_COORDS}}<br> <!-- Line written by ChatGPT -->
            🏁 <strong>End:</strong> {{END_COORDS}} <!-- Line written by ChatGPT -->
        </div>
    </div>

</div>
